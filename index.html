<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cam Drawer — El Hareketleriyle Çizim</title>
    <link rel="stylesheet" href="./styles.css" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  </head>
  <body>
    <div id="app">
      <video id="camera" autoplay playsinline muted></video>

      <canvas id="drawCanvas"></canvas>
      <canvas id="overlayCanvas"></canvas>

      <div class="toolbar">
        <div class="section">
          <button id="tool-pen" class="tool active" title="Kalem">✏️</button>
          <button id="tool-eraser" class="tool" title="Silgi">🧽</button>
          <button id="undo" class="tool" title="Geri Al">↩️</button>
          <button id="clear" class="tool" title="Temizle">🗑️</button>
          <button id="save" class="tool" title="Kaydet">💾</button>
        </div>
        <div class="section colors" id="colors"></div>
        <div class="section slider">
          <input id="brushSize" type="range" min="2" max="40" value="8" />
          <span id="brushLabel">8px</span>
        </div>
        <div class="section">
          <button id="toggle-tongue" class="tool" title="Dil ile silmeyi aç/kapat">👅</button>
        </div>
        <div class="section hint">
          <span>İpucu: Başparmak + İşaret parmağı sıkıştır → çiz</span>
        </div>
      </div>

      <div id="status" class="status">Hazır</div>
    </div>

    <!-- MediaPipe libs -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>

    <script src="./app.js"></script>
  </body>
  </html>
